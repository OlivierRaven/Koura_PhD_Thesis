project:
  type: default
  output-dir: docs
  post-render: deploy.R
  render:
    - thesis.qmd

execute:
  freeze: false
  cache: false
  warning: false
  message: false

filters:
  - filters/strip-chapter-only.lua
  - filters/suppress-supplementary.lua

bibliography: references/references.bib
csl: references/springer-basic-author-date.csl

format:
  html:
    output-file: index.html
    theme:
      light: flatly
      dark: darkly
    code-fold: true
    code-tools: true
    code-summary: "View Code"
    toc: true
    toc-depth: 3
    toc-location: right
    number-sections: true
    number-depth: 1
    smooth-scroll: true
    format-links: [pdf, docx]
  docx:
    toc: true
    toc-depth: 1
    reference-doc: references/reference.docx
    pandoc-args: ["--variable", "table-style=Table Grid"]
  pdf:
    keep-tex: true
    pdf-engine: xelatex
    documentclass: scrbook
    classoption: ["oneside"]
    papersize: a4
    fontsize: 12pt
    linestretch: 1.2
    geometry:
      - top=25.4mm
      - bottom=25.4mm
      - left=25.4mm
      - right=25.4mm
    toc: false
    toc-depth: 1
    number-sections: true
    number-depth: 1
    mainfont: "Crimson Pro"
    sansfont: "Source Sans 3"
    include-in-header:
      text: |
        \setcounter{tocdepth}{1}
        \usepackage{setspace}
        \onehalfspacing
        \usepackage{xcolor}
        \usepackage{afterpage}
        \usepackage{eso-pic}
        \usepackage{tikz}
        \usepackage{pdfpages}
        \usepackage{enumitem}
        \definecolor{thesiscream}{RGB}{255, 252, 240}
        \definecolor{thesissand}{RGB}{232, 212, 162}
        \pagecolor{thesiscream}
        \addtokomafont{disposition}{\sffamily}
        \graphicspath{{.}{images/}{01_general_intro/images/}{02_koura_fear/images/}{03_koura_shoreline_habitats/images/}{04_koura_mesocosm/images/}{05_stone_piles_rotoiti/images/}{06_synthesis/images/}{07_general_conclusion/images/}}
        \makeatletter
        \renewcommand*{\chapterheadstartvskip}{\vspace*{0pt}}
        \@ifundefined{abstract}%
          {\newenvironment{abstract}{}{}}%
          {\renewenvironment{abstract}{}{}}
        \makeatother
